<!DOCTYPE html>
<html>
<head>
<title>Contact</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- CONTACT SECTION -->
<section class="contact-section">

<h2>Contact Us</h2>
<p class="contact-subtitle">We’d love to hear from you</p>

<div class="contact-container">

<!-- LEFT FORM -->
<div class="contact-form">
<input type="text" id="name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email Address">

<input type="tel" id="phone" placeholder="Mobile Number">

<select id="method">
<option>Email</option>
<option>Phone</option>
<option>WhatsApp</option>
</select>

<textarea id="message" placeholder="Your Message"></textarea>

<button onclick="submitContact()">Send Message</button>

</div>

<!-- RIGHT SIDE -->
<div class="contact-info">

<h3>Get In Touch</h3>

<p>📍 Pune, Maharashtra, India</p>
<p>📞 +91 9876543210</p>
<p>✉️ support@luxuryhotel.com</p>

<iframe 
src="https://maps.google.com/maps?q=Pune&t=&z=13&ie=UTF8&iwloc=&output=embed">
</iframe>

</div>

</div>

</section>

<script src="script.js"></script>
</body>
</html>
